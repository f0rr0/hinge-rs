minimum_prek_version = "0.3.10"
default_install_hook_types = ["pre-commit", "pre-push", "commit-msg"]
exclude = "^(target|xtask/target)/"

[[repos]]
repo = "builtin"

[[repos.hooks]]
id = "trailing-whitespace"
args = ["--markdown-linebreak-ext=md"]
stages = ["pre-commit"]

[[repos.hooks]]
id = "end-of-file-fixer"
stages = ["pre-commit"]

[[repos.hooks]]
id = "check-added-large-files"
args = ["--maxkb=1024"]
stages = ["pre-commit"]

[[repos.hooks]]
id = "check-case-conflict"
stages = ["pre-commit"]

[[repos.hooks]]
id = "check-illegal-windows-names"
stages = ["pre-commit"]

[[repos.hooks]]
id = "check-merge-conflict"
stages = ["pre-commit"]

[[repos.hooks]]
id = "detect-private-key"
stages = ["pre-commit"]

[[repos.hooks]]
id = "check-json"
stages = ["pre-commit"]

[[repos.hooks]]
id = "check-toml"
stages = ["pre-commit"]

[[repos.hooks]]
id = "check-yaml"
stages = ["pre-commit"]

[[repos]]
repo = "https://github.com/crate-ci/committed"
rev = "v1.1.11"

[[repos.hooks]]
id = "committed"
stages = ["commit-msg"]

[[repos]]
repo = "local"

[[repos.hooks]]
id = "pre-commit-rust"
name = "fast Rust checks"
entry = "hooks/pre-commit.sh"
language = "system"
stages = ["pre-commit"]
always_run = true
pass_filenames = false
priority = 20

[[repos.hooks]]
id = "pre-push-rust"
name = "pre-push Rust checks"
entry = "hooks/pre-push.sh"
language = "system"
stages = ["pre-push"]
always_run = true
pass_filenames = false
priority = 100
