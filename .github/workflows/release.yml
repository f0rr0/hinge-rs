name: Release

on:
  workflow_dispatch:
    inputs:
      command:
        description: "Create/update the release PR, or publish the merged release."
        required: true
        default: release-pr
        type: choice
        options:
          - release-pr
          - release
      dry-run:
        description: "For release command only: calculate and validate without publishing/tagging."
        required: true
        default: true
        type: boolean

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write
  pages: write

env:
  CARGO_TERM_COLOR: always
  PREK_VERSION: 0.3.10

jobs:
  verify:
    name: Pre-release verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: taiki-e/install-action@v2
        with:
          tool: prek@${{ env.PREK_VERSION }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            xtask -> target

      - name: Validate release gates
        run: scripts/validate.sh release

  release-pr:
    name: Create or update release PR
    if: inputs.command == 'release-pr'
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-dry-run:
    name: Dry-run release
    if: inputs.command == 'release' && inputs['dry-run']
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: release-plz/action@v0.5
        with:
          command: release
          dry_run: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Publish release
    if: inputs.command == 'release' && !inputs['dry-run']
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: crates-io
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-docs:
    name: Deploy versioned docs
    if: inputs.command == 'release' && !inputs['dry-run']
    needs: release
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            xtask -> target

      - name: Build versioned Pages artifact
        run: scripts/build-pages.sh "$RUNNER_TEMP/pages"

      - uses: actions/configure-pages@v6
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ runner.temp }}/pages

      - id: deployment
        uses: actions/deploy-pages@v5
